name: Build desktop apps

# Builds desktop installers for two apps on three platforms (six jobs in
# parallel) and uploads each installer as a workflow artifact you can
# download from the run summary.
#
# Targets:
#   - protomcp:    cloned from https://github.com/SahanUday/ProtoMCP.
#                  Full plugin set (jac_scale + byllm + jac_mcp).
#   - all-in-one:  jac-client/jac_client/examples/all-in-one.
#                  Baseline plugins (jac_scale + byllm).
#
# Platforms / installer formats:
#   - linux   (ubuntu-22.04)   → .deb + .rpm
#   - macos   (macos-latest)   → .dmg
#   - windows (windows-latest) → NSIS .exe
#
# Triggered on push touching jaclang / jac-client / jac-scale / this
# workflow, or via manual workflow_dispatch.

on:
  push:
    paths:
      - .github/workflows/build-desktop.yml
      - jac/**
      - jac-client/**
      - jac-scale/**
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - protomcp
          - all-in-one
        os:
          - ubuntu-22.04
          - macos-latest
          - windows-latest
        include:
          - os: ubuntu-22.04
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
          - target: protomcp
            example_dir: ProtoMcp
            with_mcp: true
          - target: all-in-one
            example_dir: jac-client/jac_client/examples/all-in-one
            with_mcp: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ProtoMcp lives in its own repo; clone it into ./ProtoMcp.
      - name: Checkout ProtoMcp source
        if: matrix.target == 'protomcp'
        uses: actions/checkout@v4
        with:
          repository: SahanUday/ProtoMCP
          path: ProtoMcp

      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reg-${{ matrix.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-reg-${{ matrix.os }}-${{ matrix.target }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # jaclang / jac-client / jac-scale editable from this checkout so
      # any in-branch fixes are exercised. byllm + (when needed) jac-mcp
      # and jasketch-mcp-server come from PyPI.
      - name: Install Jac packages
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -e ./jac
          pip install -e ./jac-client
          pip install -e ./jac-scale
          pip install byllm
          if [ "${{ matrix.with_mcp }}" = "true" ]; then
            pip install jac-mcp jasketch-mcp-server
          fi
          pip install pyinstaller Pillow

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Tauri CLI
        shell: bash
        run: |
          if command -v cargo-tauri &>/dev/null; then
            echo "cargo-tauri already installed"
          elif command -v cargo-binstall &>/dev/null || \
               (curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash); then
            cargo binstall tauri-cli --no-confirm --no-discover-github-token || \
              cargo install tauri-cli --locked
          else
            cargo install tauri-cli --locked
          fi

      - name: Setup desktop target
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        run: |
          rm -rf src-tauri
          jac setup desktop

      # Pin [desktop.plugins] explicitly so the build is reproducible
      # regardless of what the example's jac.toml ships with.
      - name: Configure desktop plugins
        working-directory: ${{ matrix.example_dir }}
        env:
          MCP: ${{ matrix.with_mcp }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re
          from pathlib import Path
          p = Path('jac.toml')
          text = p.read_text() if p.exists() else ''
          text = re.sub(r'\[desktop\.plugins\][^\[]*', '', text).rstrip()
          mcp = os.environ.get('MCP', 'false').lower() == 'true'
          block = (
              '\n\n[desktop.plugins]\n'
              'jac_scale = true\n'
              'byllm = true\n'
              'jac_coder = false\n'
              f'jac_mcp = {"true" if mcp else "false"}\n'
              'jac_client = true\n'
          )
          p.write_text(text + block)
          PY

      # Per-platform bundle target overrides:
      #   linux:   deb + rpm     (skip AppImage; it bloats and flakes on CI)
      #   windows: nsis          (handles big bundles better than WiX MSI)
      #   macos:   default (dmg) — no override needed
      - name: Restrict bundle targets (linux)
        if: matrix.platform == 'linux'
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          conf = 'src-tauri/tauri.conf.json'
          with open(conf) as f: c = json.load(f)
          c['bundle']['targets'] = ['deb', 'rpm']
          with open(conf, 'w') as f: json.dump(c, f, indent=2)
          PY

      - name: Restrict bundle targets (windows)
        if: matrix.platform == 'windows'
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        run: |
          python -c "
          import json
          conf = 'src-tauri/tauri.conf.json'
          with open(conf) as f: c = json.load(f)
          c['bundle']['targets'] = ['nsis']
          with open(conf, 'w') as f: json.dump(c, f, indent=2)
          "

      - name: Build desktop app
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        env:
          JAC_BUILD: "1"
          NO_STRIP: "true"
        run: jac build --client desktop --platform ${{ matrix.platform }}
        timeout-minutes: 60

      - name: List installers
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        run: |
          ls -lh src-tauri/target/*/release/bundle/{deb,rpm,dmg,nsis,msi}/*.{deb,rpm,dmg,exe,msi} \
            2>&1 || true

      # Per-format artifact uploads. Each step's `if` matches its platform
      # so we don't upload empty artifacts.
      - name: Upload deb installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.platform }}-deb
          path: ${{ matrix.example_dir }}/src-tauri/target/*/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload rpm installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.platform }}-rpm
          path: ${{ matrix.example_dir }}/src-tauri/target/*/release/bundle/rpm/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Upload dmg installer
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.platform }}-dmg
          path: ${{ matrix.example_dir }}/src-tauri/target/*/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

      - name: Upload nsis installer
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-${{ matrix.platform }}-exe
          path: ${{ matrix.example_dir }}/src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Job summary
        if: always()
        working-directory: ${{ matrix.example_dir }}
        shell: bash
        run: |
          {
            echo "## \`${{ matrix.target }}\` — ${{ matrix.platform }}"
            echo ""
            for f in src-tauri/target/*/release/bundle/{deb,rpm,dmg,nsis,msi}/*.{deb,rpm,dmg,exe,msi}; do
              [ -f "$f" ] || continue
              echo "- \`$(basename "$f")\` ($(du -h "$f" | cut -f1))"
            done
            echo ""
            echo "Download via the **Artifacts** section of the run summary."
          } >> "$GITHUB_STEP_SUMMARY"
