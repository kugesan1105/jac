name: CI plan (shared)

# Shared, reusable gate for on-demand CI. Every test workflow calls this once
# instead of copy-pasting its own `plan` job, so the suite-selection logic lives
# in ONE place (ci-requested-suites.sh).
#
# Returns `requested`: a space-separated list of the suites this run should
# execute. Callers gate each job with:
#
#   needs:
#     plan:
#       uses: ./.github/workflows/ci-plan.yml
#   <suite-job>:
#     needs: plan
#     if: contains(format(' {0} ', needs.plan.outputs.requested), ' <suite> ')
#
# On push the script returns every suite (full post-merge coverage); on a PR it
# returns only what the latest `/test` comment requested (empty on the initial
# attempt, so a fresh commit starts clean -- see ci-requested-suites.sh).

on:
  workflow_call:
    outputs:
      requested:
        description: "Space-separated suites to run (empty = none)."
        value: ${{ jobs.plan.outputs.requested }}

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      requested: ${{ steps.s.outputs.requested }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - id: s
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/ci-requested-suites.sh
