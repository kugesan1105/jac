name: Contribution Checks

# Triggered on-demand from a /test PR comment (via ci-suites.yml) and on push to
# main (via ci-main.yml). The PR-diff checks need PR context the comment trigger
# does not carry implicitly, so it is passed in (base_ref, pr_number, labels...).
on:
  workflow_call:
    inputs:
      sha:
        description: 'PR head SHA to check out'
        required: false
        type: string
      base_ref:
        description: 'PR base branch (e.g. main); empty on push to main'
        required: false
        type: string
        default: ''
      pr_number:
        required: false
        type: string
        default: ''
      pr_title:
        required: false
        type: string
        default: ''
      pr_author:
        required: false
        type: string
        default: ''
      labels:
        description: 'JSON array of PR label names'
        required: false
        type: string
        default: '[]'
      runner:
        description: 'Runner label (override to ubuntu-latest for fork testing)'
        required: false
        type: string
        default: blacksmith-4vcpu-ubuntu-2404
  workflow_dispatch:

jobs:
  contribution-checks:
    name: Contribution Checks
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          submodules: true

      - name: Block AI co-author attribution
        if: inputs.base_ref != ''
        run: |
          if git log origin/${{ inputs.base_ref }}..HEAD --format='%b' \
            | grep -iP 'co-authored-by:.*\b(claude|anthropic|openai|copilot|composer|cursor|gpt|gemini|ai|bot)\b'; then
            echo "::error::AI co-author attribution found in commit messages. Please remove Co-Authored-By lines referencing AI tools."
            exit 1
          fi

      - name: Block Python files
        if: |
          inputs.base_ref != '' &&
          !contains(fromJSON(inputs.labels), 'skip-no-python-check')
        run: |
          if git diff --name-only --diff-filter=A origin/${{ inputs.base_ref }}...HEAD \
            | grep -P '\.py$'; then
            echo "::error::New Python (.py) files detected in this PR. This codebase does not allow adding Python files."
            echo "To skip this check, add the 'skip-no-python-check' label to your PR."
            exit 1
          fi

      - name: Set up Python 3.12 (for the mkdocs docs build)
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install docs project (jaclang is host-provided by the binary)
        run: jac install -e docs

      - name: Validate Jac code block syntax
        run: jac run docs/scripts/validate_docs_code.jac

      - name: Build documentation and check links
        working-directory: docs
        # mkdocs installs into the binary's bundled interpreter; invoke it via
        # `jac -m` rather than expecting a console script on PATH.
        run: jac -m mkdocs build --strict 2>&1 | tee build.log || true

      - name: Report link warnings
        working-directory: docs
        run: |
          if grep -i "warning" build.log | grep -i "link"; then
            echo "## ⚠️ Documentation Link Warnings" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            grep -i "warning" build.log | grep -i "link" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ All Checks Passed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Jac code block syntax: ✓" >> $GITHUB_STEP_SUMMARY
            echo "- Internal links: ✓" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Release Notes Updated
        if: |
          inputs.pr_number != '' &&
          !contains(fromJSON(inputs.labels), 'skip-release-notes-check')
        env:
          CI: "true"
          PR_TITLE: ${{ inputs.pr_title }}
          PR_AUTHOR: ${{ inputs.pr_author }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: bash scripts/check-release-notes.sh
