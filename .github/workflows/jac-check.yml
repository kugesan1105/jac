name: Jac Type Check

# Triggered on-demand from a /test PR comment (via ci-suites.yml) and on push to
# main (via ci-main.yml).
on:
  workflow_call:
    inputs:
      sha:
        description: 'Commit SHA to check out (PR head, or the main commit)'
        required: false
        type: string
      runner:
        description: 'Runner label (override to ubuntu-latest for fork testing)'
        required: false
        type: string
        default: blacksmith-4vcpu-ubuntu-2404
  workflow_dispatch:

jobs:
  jac-check:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install plugins (deps into project venvs; jaclang is host-provided)
        run: |
          jac install -e ./jac-scale --extras all
          jac install -e ./jac-byllm

      - name: Warm up compiler cache
        run: jac --version

      - name: Run jac format (check formatting)
        run: |
          find . -type f -name "*.jac" ! -path "*/fixtures/*" ! -path "./scripts/*" ! -name "*_err.jac" ! -name "*_syntax_err.jac" -print0 | xargs -0 --no-run-if-empty jac format --check --lintfix

      - name: Verify jir_registry.jac is up to date
        run: |
          jac gen-jir-registry --verify

      - name: Run jac check (using .jacignore)
        run: |
          jac check . --ignore tests checker_*.jac *_err.jac $(grep -v '^#' .jacignore | grep -v '^[[:space:]]*$' | tr '\n' ' ') --nowarn

      - name: Error-code breakdown (label "type-error-report")
        # The PR label that used to drive this is not available on a
        # comment-triggered run; keep it for manual/dispatch use only.
        if: github.event_name == 'workflow_dispatch'
        run: |
          set +e
          echo "Scanning the whole codebase (no ignores) for an error-code breakdown..."
          jac check . --nowarn > jac-check-full.log 2>&1

          {
            echo "## jac check error-code breakdown (whole codebase, no ignores)"
            echo ""
            echo "| Error code | Count |"
            echo "| --- | ---: |"
            grep -oE 'error\[E[0-9]+\]' jac-check-full.log \
              | grep -oE 'E[0-9]+' \
              | sort | uniq -c | sort -rn \
              | awk '{ printf "| %s | %d |\n", $2, $1; total += $1 }
                     END { printf "| **TOTAL** | **%d** |\n", total }'
          } >> "$GITHUB_STEP_SUMMARY"

          exit 0
