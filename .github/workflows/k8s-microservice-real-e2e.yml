name: K8s Microservice Real E2E

# Real-app e2e: builds the fixture image, deploys via the microservice
# K8s pipeline against microk8s, verifies pods + gateway routing,
# rolling-restart + hammer-for-non-2xx.

# The whole `k8s` suite: the kind-based scale matrix plus the heavy microk8s
# real-app e2e. Triggered on-demand from a /test PR comment (via ci-suites.yml)
# and on push to main (via ci-main.yml).
on:
  workflow_call:
    inputs:
      sha:
        description: 'Commit SHA to check out (PR head, or the main commit)'
        required: false
        type: string
      labels:
        description: 'JSON array of PR label names (for the skip-k8s escape hatch)'
        required: false
        type: string
        default: '[]'
      runner:
        description: 'Runner label (override to ubuntu-latest for fork testing)'
        required: false
        type: string
        default: blacksmith-4vcpu-ubuntu-2404
  workflow_dispatch:

jobs:
  # Kind-based scale k8s matrix (moved here from test-jaseci so the whole `k8s`
  # suite lives in one file).
  test-scale-k8s:
    if: ${{ !contains(fromJSON(inputs.labels), 'skip-k8s') }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        group: [deploy-core, failure-path]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.sha }}
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install Jaseci scale package (jaclang host-provided by the binary)
        run: jac install -e jac-scale --extras deploy

      - name: Write kind config
        run: |
          cat <<EOF > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 30080
              protocol: TCP
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: jaseci-test
          wait: 120s
          config: /tmp/kind-config.yaml

      - name: Run K8 tests (deploy-core)
        if: matrix.group == 'deploy-core'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_image_build.jac -x
          jac test jac_scale/tests/test_pod_env.jac -x
          jac test jac_scale/tests/test_k8s_utils.jac -x
          jac test jac_scale/tests/test_deploy_k8s.jac -x -f "not (early and exit)"

      - name: Run K8 tests (failure-path)
        if: matrix.group == 'failure-path'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_deploy_k8s.jac -x --test_name "early exit"

  real-e2e:
    name: microk8s real-app smoke
    # Escape hatch: add the 'skip-k8s' label to a PR to skip this job too.
    if: ${{ !contains(fromJSON(inputs.labels), 'skip-k8s') }}
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install jac-scale[deploy] (jaclang is host-provided by the binary)
        run: jac install -e jac-scale --extras deploy

      - name: Set up microk8s
        run: |
          sudo snap install microk8s --classic --channel=1.30/stable
          sudo microk8s status --wait-ready --timeout 180
          sudo usermod -aG microk8s "$USER"
          mkdir -p "$HOME/.kube"
          sudo microk8s config | sudo tee "$HOME/.kube/config" >/dev/null
          sudo chown "$USER" "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Pre-pull + enable addons (best-effort)
        # registry.k8s.io has been flaky on GHA. Pre-pulling via
        # containerd directly lets us retry without restarting the
        # kubelet's image-pull state machine.
        continue-on-error: true
        run: |
          for img in registry.k8s.io/metrics-server/metrics-server:v0.7.2 \
                     registry.k8s.io/ingress-nginx/controller:v1.10.1; do
            for _ in 1 2 3; do sudo microk8s ctr images pull "$img" && break; sleep 5; done
          done
          sudo microk8s enable metrics-server || echo "WARN: metrics-server enable failed"
          sudo microk8s enable ingress || echo "WARN: ingress enable failed"
          kubectl wait --namespace ingress --for=condition=ready pod \
              --selector=name=nginx-ingress-microk8s --timeout=180s \
              || echo "WARN: ingress controller not ready; K10 path will skip"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore BuildKit cache (pip wheels + apt downloads)
        # Exact-key only. Broad restore-keys (`buildkit-${os}-`) can pull
        # stale layer cache from other PRs and BuildKit reuses the cached
        # COPY layer even when the new source tree disagrees.
        uses: actions/cache@v4
        with:
          path: /tmp/buildkit-cache
          key: buildkit-${{ runner.os }}-${{ hashFiles('jac/jac.toml', 'jac-scale/jac.toml', 'jac-scale/scripts/Dockerfile.microservice.exp') }}

      - name: Show cluster info
        run: |
          kubectl version
          kubectl cluster-info
          kubectl get nodes
          kubectl get pods -A

      - name: Run K8s microservice real-app e2e
        env:
          CLUSTER_TYPE: microk8s
          BUILDX_CACHE_DIR: /tmp/buildkit-cache
        run: |
          bash jac-scale/scripts/k8s_microservice_real_e2e.sh \
              jac-scale/jac_scale/tests/fixtures/k8s_e2e

      - name: Dump kubectl state on failure
        if: failure()
        run: |
          echo "=== events ==="
          kubectl get events --sort-by='.lastTimestamp' --all-namespaces || true
          echo "=== pods ==="
          kubectl get pods -A -o wide || true
          echo "=== describe pods (jac-e2e ns) ==="
          kubectl describe pods -n jac-e2e || true
          echo "=== gateway logs ==="
          kubectl logs -n jac-e2e -l app=gateway --tail=100 || true
          echo "=== service-app logs (sample) ==="
          for app in cart-app orders-app products-app; do
              echo "--- $app ---"
              kubectl logs -n jac-e2e -l app=$app --tail=50 || true
          done
          echo "=== ingress status ==="
          kubectl describe ingress -n jac-e2e || true
          echo "=== ingress controller logs ==="
          kubectl logs -n ingress -l name=nginx-ingress-microk8s --tail=50 || true
