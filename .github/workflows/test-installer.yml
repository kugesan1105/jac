name: Test Installer

# Exercises the user-facing install path: scripts/install.sh downloads the
# self-contained native `jac` binary from the latest GitHub Release and runs it.
# jaclang is no longer on PyPI -- there is no uv/pip install path to test.

on:
  # On a PR this skips unless requested via `/test installer` (see
  # ci-command.yml); push to main runs it when the installer scripts change.
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - ".github/workflows/test-installer.yml"

# Cancel superseded PR runs; never cancel a run for a commit on main.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Runs on push (always) or on a PR only when a collaborator commented
  # `/test installer` for the current head commit (read from the PR comments).
  plan:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.s.outputs.run }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - id: s
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'push') { core.setOutput('run', 'true'); return; }
            const req = await require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ci-requested-suites.js`)({
              github, context, suites: ['installer'],
            });
            core.setOutput('run', req.has('installer') ? 'true' : 'false');

  shellcheck:
    needs: plan
    if: needs.plan.outputs.run == 'true'
    name: ShellCheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: shellcheck scripts/install.sh

  install:
    needs: plan
    if: needs.plan.outputs.run == 'true'
    name: "Install: ${{ matrix.platform }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
          - os: macos-14
            platform: macos-aarch64
    steps:
      - uses: actions/checkout@v5

      # The installer downloads from the latest published release. Until a
      # release carries the native `jac-<ver>-<platform>` binary asset (the
      # first release after the binary clean break), skip gracefully instead of
      # failing -- there is nothing for the installer to fetch yet.
      - name: Check for a native binary asset on the latest release
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view --repo "$GITHUB_REPOSITORY" \
               --json assets --jq '.assets[].name' 2>/dev/null \
               | grep -q "jac-.*-${{ matrix.platform }}$"; then
            echo "has_asset=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_asset=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No jac-*-${{ matrix.platform }} asset on the latest release yet; skipping the download test."
          fi

      - name: "install: download + run the binary"
        if: steps.gate.outputs.has_asset == 'true'
        run: bash scripts/install.sh

      - name: "install: verify jac"
        if: steps.gate.outputs.has_asset == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          which jac
          jac --version

      - name: "install: run a test program"
        if: steps.gate.outputs.has_asset == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          echo 'with entry { print("hello from the jac binary"); }' > /tmp/test_install.jac
          jac /tmp/test_install.jac

      - name: "install: uninstall"
        if: steps.gate.outputs.has_asset == 'true'
        run: bash scripts/install.sh --uninstall

      - name: "install: verify removal"
        if: steps.gate.outputs.has_asset == 'true'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if command -v jac &>/dev/null; then
            echo "FAIL: jac still found after uninstall"
            exit 1
          fi
          echo "PASS: jac removed"
