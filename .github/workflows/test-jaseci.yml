name: Run tests for jaseci

# Called by the ci.yml orchestrator, which owns the on-demand gate. It passes the
# space-separated list of requested suites as `inputs.requested`; each job below
# gates on it. This one file holds several suites (core's solid-jsdom, client,
# scale, mcp, byllm, docs, desktop, macos, pypi, k8s), so the gate is per-job.
on:
  workflow_call:
    inputs:
      requested:
        description: "Space-separated suites to run (from ci.yml's plan)."
        required: true
        type: string

permissions:
  contents: read

jobs:
  # NOTE: jaclang's own test suite (formerly test-core-compiler / test-core-runtime,
  # `pip install -e jac` + pytest) now runs through the single `jac` binary in
  # test-binary.yml ("jac single-binary self-test" -> Full repo suite), which gates
  # the same changes on PRs to main. Removed here as part of the clean break off the
  # editable install (#6852). The jobs below cover plugins / client / docs / pypi.

  test-solid-jsdom:
    # Runtime exec of the Solid framework backend: compile a Solid component +
    # the @jac/runtime shim to JS and mount it in jsdom under node, asserting
    # render + reactivity. Needs a real `bun install` (jsdom + solid-js), so the
    # test self-skips unless JAC_CLIENT_INTEGRATION is set -- we set it here and
    # run just that file in its own lean job.
    # Part of the `core` suite (`/test core` / `/test all`); runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' core ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run Solid jsdom runtime test
      env:
        JAC_CLIENT_INTEGRATION: "1"
      run: jac test jac/tests/runtimelib/test_solid_jsdom.jac -x

  test-client:
    # `client` suite (`/test client` / `/test all`); runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' client ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Set environment for testing
      run: echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run all client tests
      run: jac test jac/tests/runtimelib/client

  test-packages-and-docs:
    # Tests jac-byllm + builds/validates docs. Runs for `byllm` or `docs`
    # (`/test byllm`, `/test docs`, `/test all`); runs on push too.
    if: >-
      contains(format(' {0} ', inputs.requested), ' byllm ') ||
      contains(format(' {0} ', inputs.requested), ' docs ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-byllm (deps into venv; jaclang host-provided by the binary)
      run: jac install -e jac-byllm

    - name: Set environment for testing
      run: echo "TEST_ENV=true" >> $GITHUB_ENV

    - name: Run package tests
      working-directory: jac-byllm
      run: jac test .

    - name: Install docs dependencies
      run: jac install -e docs

    - name: Build documentation
      working-directory: docs
      # mkdocs + its plugins install into the binary's bundled interpreter, so
      # run them through it (`jac -m`) rather than expecting a console script on
      # PATH.
      run: jac -m mkdocs build --strict

    - name: Run documentation validation tests
      working-directory: docs
      run: jac test tests/test_docs.jac

    - name: Install Playwright
      working-directory: docs
      run: |
        jac install playwright
        jac -m playwright install chromium --with-deps

    - name: Run E2E code block tests
      working-directory: docs
      # Browser rendering of the graph/error playground blocks is timing-flaky on
      # CI runners (maintainers have de-flaked this suite twice: #6528, #6756). It
      # is a non-required smoke, so retry once before failing rather than block on
      # a transient slow render. `-x` so a genuine break still fails fast.
      run: jac test tests/e2e/test_code_blocks.jac -x || jac test tests/e2e/test_code_blocks.jac -x

  test-desktop-native:
    # Jac-native desktop tests (issue #6436). Dependency-free by design: they
    # only need the jac toolchain to compile the example hosts and inspect the
    # linked artifacts (DT_NEEDED / $ORIGIN) and run handler logic through the sv
    # pathway - NO WebKitGTK, no libpython-dev, no display/Xvfb. The webview /
    # embedded-Python *runtime* behavior is covered by a separate, gated tier.
    # `desktop` suite (`/test desktop` / `/test all`); runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' desktop ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run dependency-free desktop tests
      run: jac test jac/tests/runtimelib/client/test_desktop_binding.jac

  test-native-macos:
    # Lean macOS-only coverage for the pure-Jac Mach-O linker changes: the
    # dylib dlopen/dlsym round-trip that guards #6821 plus the executable /
    # dylib arm64 code-signing invariants added in PR #6828.
    # `macos` suite (`/test macos` / `/test all`). macos-latest is a premium
    # runner, so it stays opt-in on PRs; runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' macos ')
    runs-on: macos-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Run native Mach-O linker regression tests
      # `jac test` takes one target at a time (unlike pytest's multi-file form).
      run: |
        jac test jac/tests/compiler/passes/native/test_shared_lib.jac
        jac test jac/tests/compiler/passes/native/test_exec_link.jac

  # NOTE: the real-windows-host native job (test-native-windows) was retired in
  # the clean break to the single binary. jaclang ships only as the `jac` binary,
  # which builds for Linux and macOS (python-build-standalone has no Windows
  # target -- see build.zig osArchString / fetch-pbs.sh), so there is no way to
  # run jaclang on a windows-latest runner via `pip install -e jac` anymore. The
  # PE/COFF linker logic stays covered by the cross-compiled PE tests in the
  # blocking binary gate (test_pe_linker.jac); restoring a real-Windows-loader
  # check needs a Windows binary build, tracked as a follow-up.

  test-mcp:
    # `mcp` suite (`/test mcp` / `/test all`); runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' mcp ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-mcp (deps into venv; jaclang host-provided by the binary)
      run: jac install -e jac-mcp

    - name: Run jac-mcp tests
      # cwd = plugin dir so jac auto-loads jac-mcp/.jac/venv (its deps) on top of
      # the binary's host jaclang.
      working-directory: jac-mcp
      run: jac test .

  test-scale:
    # `scale` suite (`/test scale` / `/test all`); runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' scale ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        group: [server, data, microservices, deploy, misc]
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Install jac-scale with all test extras (jaclang host-provided)
      run: jac install -e jac-scale --extras test

    - name: Run ${{ matrix.group }} tests
      # cwd = plugin dir so jac auto-loads jac-scale/.jac/venv (its deps).
      working-directory: jac-scale
      run: |
        set +e
        failed=""
        # One process per file: the suite relies on per-file isolation.
        for f in jac_scale/tests/${{ matrix.group }}/test_*.jac; do
          echo "::group::$f"
          JAC_TEST_JOBS=0 jac test "$f" || failed="$failed $f"
          echo "::endgroup::"
        done
        if [ -n "$failed" ]; then
          echo "::error::Failed ${{ matrix.group }} test files:$failed"
          exit 1
        fi

  test-scale-k8s:
    # `k8s` suite (`/test k8s` / `/test all`); runs on push too. The 'skip-k8s'
    # label still force-skips it.
    if: >-
      contains(format(' {0} ', inputs.requested), ' k8s ') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-k8s')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        group: [deploy-core, failure-path]
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up jac (build the binary)
        uses: ./.github/actions/setup-jac

      - name: Install Jaseci scale package (jaclang host-provided by the binary)
        run: jac install -e jac-scale --extras deploy

      - name: Write kind config
        run: |
          cat <<EOF > /tmp/kind-config.yaml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 30080
              hostPort: 30080
              protocol: TCP
          EOF

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: jaseci-test
          wait: 120s
          config: /tmp/kind-config.yaml

      - name: Run K8 tests (deploy-core)
        if: matrix.group == 'deploy-core'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_image_build.jac -x
          jac test jac_scale/tests/test_pod_env.jac -x
          jac test jac_scale/tests/test_k8s_utils.jac -x
          jac test jac_scale/tests/test_deploy_k8s.jac -x -f "not (early and exit)"

      - name: Run K8 tests (failure-path)
        if: matrix.group == 'failure-path'
        working-directory: jac-scale
        env:
          JAC_TEST_JOBS: "0"
        run: |
          jac test jac_scale/tests/test_deploy_k8s.jac -x --test_name "early exit"

  test-pypi-build:
    # `pypi` suite (`/test pypi` / `/test all`). The heaviest job (all wheels +
    # jacpack smoke servers), so it stays opt-in on PRs; runs on push too.
    if: contains(format(' {0} ', inputs.requested), ' pypi ')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Check out code
      uses: actions/checkout@v5
      with:
        submodules: true

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: 3.12

    - name: Install build package
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Set up jac (build the binary)
      uses: ./.github/actions/setup-jac

    - name: Precompile all packages
      run: |
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-scale
        jac run jac/jaclang/utils/precompile_bytecode.jac ./jac-byllm

    - name: Pre-build admin dashboard UI
      run: |
        jac install -e jac-scale --extras all
        cd jac-scale && jac run scripts/build_admin_ui.jac

    - name: Uninstall editable packages
      run: |
        pip uninstall -y jac-scale

    - name: Clean egg-info to simulate fresh build (like publish-release)
      run: |
        rm -rf jac/jaclang.egg-info
        rm -rf jac-scale/*.egg-info jac-scale/jac_scale/*.egg-info
        rm -rf jac-byllm/*.egg-info

    - name: Build plugin wheels (jaclang itself ships as the binary, not a wheel)
      run: |
        (cd jac-scale && jac bundle)
        (cd jac-byllm && jac bundle)
        # Install the freshly built wheels INTO the binary's runtime (not system
        # Python -- jaclang is host-provided by the binary, so the plugins must
        # be importable by it). pytest ships in the binary, so no pip pytest.
        SCALE_WHL=$(ls jac-scale/dist/jac_scale-*.whl) && jac install "${SCALE_WHL}"
        jac install jac-byllm/dist/byllm-*.whl

    - name: Verify cold start with precompiled bytecode
      run: |
        jac purge
        timeout 5 jac --version

    - name: Verify bundled guides print from the built wheel
      run: bash scripts/check-guide.sh jac

    - name: Run integration tests
      run: jac run scripts/integration_tests.jac

    - name: Run tests on built packages
      run: |
        jac check jac/tests/compiler/passes/main/fixtures/checker/checker_type_ref.jac
        # Run through the binary (its bundled pytest + the host jaclang). The
        # `jac create` client flow is already covered by the blocking binary
        # gate and the jacpack smokes below, so it is not duplicated here.
        # Serial (JAC_TEST_JOBS=0): these byllm tests share a SQLite mock-LLM
        # cache that can't take xdist's parallel writers ("database is locked").
        JAC_TEST_JOBS=0 jac test jac-byllm/tests/test_byllm.jac

    # ========== jac-gpt test ==========
    - name: Create jac-gpt from jacpack
      run: |
        jac create jac-gpt --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/jac-gpt/jac-gpt.jacpack
        cd jac-gpt && jac install

    - name: Install Playwright dependencies
      # Into the binary runtime, since the e2e test runs through the binary.
      run: |
        jac install playwright
        jac -m playwright install chromium --with-deps

    - name: Type check jac-gpt
      working-directory: jac-gpt
      run: jac check main.jac

    - name: Restore FAISS index cache
      uses: actions/cache@v4
      with:
        path: jac-gpt/services/faiss_index
        key: jac-gpt-faiss-v1

    - name: Start jac-gpt server in background
      working-directory: jac-gpt
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        timeout 600 jac start main.jac > /tmp/jac-gpt-server.log 2>&1 &
        SERVER_PID=$!
        echo "JAC_GPT_PID=$SERVER_PID" >> $GITHUB_ENV
        echo "jac-gpt server starting with PID $SERVER_PID..."
        sleep 10
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/jac-gpt-server.log
          exit 1
        fi

    - name: Wait for jac-gpt server to be ready
      run: |
        echo "Waiting for jac-gpt server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.JAC_GPT_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/jac-gpt-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "jac-gpt server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/jac-gpt-server.log
        exit 1

    - name: Verify jac-gpt HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "jac-gpt root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "jac-gpt server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Run E2E tests
      working-directory: jac-gpt
      env:
        SERVER_URL: http://localhost:8000
      # Run from the project dir so the binary loads jac-gpt's deps; the binary
      # provides jaclang + pytest (system pytest has neither).
      run: jac test tests/test_e2e.jac -vv

    - name: Stop jac-gpt server
      if: always()
      run: |
        if [ -n "${{ env.JAC_GPT_PID }}" ]; then
          kill ${{ env.JAC_GPT_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.JAC_GPT_PID }} 2>/dev/null || true
        fi

    # ========== Algo test ==========
    - name: Create Algo from jacpack
      run: |
        jac create algo --use https://raw.githubusercontent.com/jaseci-labs/jacpacks/refs/heads/main/Algo/Algo.jacpack
        cd algo && jac install

    - name: Type check Algo
      working-directory: algo
      run: jac check main.jac

    - name: Start Algo server in background
      working-directory: algo
      run: |
        timeout 600 jac start main.jac > /tmp/algo-server.log 2>&1 &
        ALGO_PID=$!
        echo "ALGO_PID=$ALGO_PID" >> $GITHUB_ENV
        echo "Algo server starting with PID $ALGO_PID..."
        sleep 10
        if ! kill -0 $ALGO_PID 2>/dev/null; then
          echo "Server process died during startup"
          cat /tmp/algo-server.log
          exit 1
        fi

    - name: Wait for Algo server to be ready
      run: |
        echo "Waiting for Algo server on port 8000..."
        for i in $(seq 1 24); do
          if ! kill -0 ${{ env.ALGO_PID }} 2>/dev/null; then
            echo "Server process exited unexpectedly"
            cat /tmp/algo-server.log
            exit 1
          fi
          if curl -sf --max-time 10 http://localhost:8000 -o /dev/null 2>&1; then
            echo "Algo server is ready (attempt $i)"
            exit 0
          fi
          echo "Attempt $i/24: not ready, waiting 15s..."
          sleep 15
        done
        echo "Server failed to respond after 24 attempts"
        tail -100 /tmp/algo-server.log
        exit 1

    - name: Verify Algo HTTP response
      run: |
        HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 http://localhost:8000)
        echo "Algo root endpoint: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ]; then
          echo "Algo server responding correctly"
        else
          echo "Unexpected HTTP $HTTP_CODE"
          exit 1
        fi

    - name: Stop Algo server
      if: always()
      run: |
        if [ -n "${{ env.ALGO_PID }}" ]; then
          kill ${{ env.ALGO_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.ALGO_PID }} 2>/dev/null || true
        fi

    # ========== fullstack eject smoke ==========
    # End-to-end: the ejected FastAPI backend (jaclang + fastapi + uvicorn) must
    # install and serve HTTP. Codegen unit tests live in test_eject.jac.
    - name: Create fullstack project and eject it
      run: |
        jac create --use fullstack fs-smoke
        jac eject fs-smoke

    - name: Install ejected backend and start it
      working-directory: fs-smoke/ejected/backend
      run: |
        pip install -r requirements.txt
        PORT=8000 timeout 600 python main.py > /tmp/fullstack-ejected.log 2>&1 &
        EJECTED_PID=$!
        echo "EJECTED_PID=$EJECTED_PID" >> $GITHUB_ENV
        sleep 5
        if ! kill -0 $EJECTED_PID 2>/dev/null; then
          echo "Ejected backend died during startup"
          cat /tmp/fullstack-ejected.log
          exit 1
        fi

    - name: Verify ejected fullstack backend responds
      run: |
        for i in $(seq 1 12); do
          if ! kill -0 ${{ env.EJECTED_PID }} 2>/dev/null; then
            echo "Ejected backend exited unexpectedly"
            tail -100 /tmp/fullstack-ejected.log
            exit 1
          fi
          if curl -sf --max-time 5 http://localhost:8000/__health -o /dev/null 2>&1; then
            echo "Ejected backend responding (attempt $i)"
            exit 0
          fi
          sleep 5
        done
        echo "Ejected backend failed to respond"
        tail -100 /tmp/fullstack-ejected.log
        exit 1

    - name: Stop ejected fullstack server
      if: always()
      run: |
        if [ -n "${{ env.EJECTED_PID }}" ]; then
          kill ${{ env.EJECTED_PID }} 2>/dev/null || true
          sleep 3
          kill -9 ${{ env.EJECTED_PID }} 2>/dev/null || true
        fi

    - name: Upload jac-gpt server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jac-gpt-test-logs
        path: /tmp/jac-gpt-server.log
        retention-days: 7

    - name: Upload Algo server logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: algo-test-logs
        path: /tmp/algo-server.log
        retention-days: 7

    - name: Upload fullstack ejected backend logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: fullstack-ejected-logs
        path: /tmp/fullstack-ejected.log
        retention-days: 7

    - name: Jac pack test summary
      if: always()
      run: |
        echo "## Jac Pack Smoke Tests" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| jac-gpt | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| algo | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| fullstack (ejected) | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
